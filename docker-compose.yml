version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartpot-api
    ports:
      - "5050:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=smartpot;Username=smartpot;Password=smartpot123
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: smartpot-db
    environment:
      POSTGRES_DB: smartpot
      POSTGRES_USER: smartpot
      POSTGRES_PASSWORD: smartpot123
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartpot -d smartpot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
